name: CI — Security & Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run a full security audit every Monday at 08:00 UTC
    # even if no code changed — catches newly disclosed CVEs
    - cron: '0 8 * * 1'

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Dependency security audit
  # Fails the build if any high or critical CVEs are found in dependencies
  # ───────────────────────────────────────────────────────────────────────────
  security-audit:
    name: Dependency security audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Check for known malicious packages (osv-scanner)
        uses: google/osv-scanner-action@v1
        with:
          scan-args: |-
            --lockfile=package-lock.json


  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Code quality lint
  # Enforces consistent style and catches common bugs
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --ext .js --max-warnings=0
        # First time setup: run  npx eslint --init  to create .eslintrc.js
        # Recommended ruleset for an Express app: eslint:recommended + node plugin


  # ───────────────────────────────────────────────────────────────────────────
  # Job 3: Secret scanning
  # Detects accidentally committed credentials, API keys, passwords
  # ───────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for Gitleaks

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ───────────────────────────────────────────────────────────────────────────
  # Job 4: Smoke test — verify the server starts cleanly
  # Catches broken imports, missing env vars, startup crashes
  # ───────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Server startup smoke test
    runs-on: ubuntu-latest
    needs: [security-audit, lint]

    env:
      NODE_ENV: test
      PORT: 3001
      SESSION_SECRET: ${{ secrets.CI_SESSION_SECRET || 'ci-test-secret-minimum-32-chars-long-xxxxxxxxx' }}
      AD_HOST: ldap://127.0.0.1
      AD_PORT: 389
      AD_BASE_DN: DC=test,DC=local
      AD_USERNAME: svc-test@test.local
      AD_PASSWORD: dummy-password-for-ci
      AD_DOMAIN: test.local
      ADMIN_AD_GROUPS: ADWebConsole-Admins
      LOCAL_ADMIN_USERNAME: localadmin
      # Use a non-example password so the startup check passes in CI
      LOCAL_ADMIN_PASSWORD: CI-Local-Admin-${{ github.run_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start server and verify HTTP 200 on health endpoint
        run: |
          # Start server in background
          node server.js &
          SERVER_PID=$!

          # Wait up to 10 seconds for it to be ready
          for i in {1..10}; do
            sleep 1
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "✅ Server is up"
              kill $SERVER_PID
              exit 0
            fi
          done

          echo "❌ Server did not respond within 10 seconds"
          kill $SERVER_PID 2>/dev/null
          exit 1
        # Note: add a GET /health route to server.js that returns 200 { status: 'ok' }
        # This is good practice anyway and required for load balancer health checks
